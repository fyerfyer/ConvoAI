services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password123}
    command: |
      bash -c '
        openssl rand -base64 756 > /data/mongodb-keyfile
        chmod 400 /data/mongodb-keyfile
        chown 999:999 /data/mongodb-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /data/mongodb-keyfile
      '
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: |
        mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME:-admin} -p $${MONGO_INITDB_ROOT_PASSWORD:-password123} --authenticationDatabase admin --eval "
        try {
          rs.status();
        } catch (err) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'localhost:27017' }]
          });
        }
        "
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/localhost/6333"']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    environment:
      LIVEKIT_KEYS: 'devkey: secret'
    command: --dev --bind 0.0.0.0
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:7880']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---- Application Services ----

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      LOG_LEVEL: info

      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}

      # CORS - Point to host-accessible frontend URL
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000

      # MongoDB - Use Docker service name
      MONGODB_URI: mongodb://admin:password123@mongo:27017/discord-platform?authSource=admin&replicaSet=rs0&directConnection=true
      MONGODB_NAME: discord-platform

      # Redis - Use Docker service name
      REDIS_URL: redis://redis:6379

      # MinIO - Use Docker service name
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PUBLIC_URL: http://localhost:9000

      # LiveKit - Use Docker service name
      LIVEKIT_HOST: ws://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret

      # Qdrant - Use Docker service name
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: discord_memory

      # ONNX Models directory (mounted via volume)
      MODELS_DIR: /usr/src/app/models

      # LLM config (optional - will use Joi defaults if not set)
      # Uncomment and set these to enable LLM features:
      # SUMMARY_LLM_BASE_URL: https://api.deepseek.com
      # SUMMARY_LLM_API_KEY: your-api-key
      # SUMMARY_LLM_MODEL: deepseek-chat

      # Embedding API (optional - will use Joi defaults if not set)
      # Uncomment and set these to enable embedding features:
      # EMBEDDING_API_KEY: your-api-key
      # EMBEDDING_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      # EMBEDDING_MODEL: text-embedding-v4
      # EMBEDDING_DIMENSION: 1024
    volumes:
      - ./apps/backend/models:/usr/src/app/models:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      livekit:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # These are baked into the Next.js bundle at build time
        NEXT_PUBLIC_API_URL: http://localhost:5000
        NEXT_PUBLIC_WS_URL: http://localhost:5000
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  minio_data:
  qdrant_data:
